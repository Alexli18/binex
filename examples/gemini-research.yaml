name: gemini-research
description: "Research pipeline using Gemini 2.5 Flash"

nodes:
  planner:
    agent: "llm://gemini/gemini-2.5-flash"
    system_prompt: "file://prompts/research-planner.md"
    inputs:
      query: "${user.query}"
    outputs: [plan]

  researcher:
    agent: "llm://gemini/gemini-2.5-flash"
    system_prompt: "file://prompts/researcher.md"
    inputs:
      questions: "${planner.plan}"
    outputs: [findings]
    depends_on: [planner]

  summarizer:
    agent: "llm://gemini/gemini-2.5-flash"
    system_prompt: "file://prompts/research-synthesizer.md"
    inputs:
      research: "${researcher.findings}"
    outputs: [report]
    depends_on: [researcher]

defaults:
  deadline_ms: 300000
