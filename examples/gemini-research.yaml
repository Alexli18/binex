name: gemini-research
description: "Research pipeline using Gemini 2.5 Flash"

nodes:
  planner:
    agent: "llm://gemini/gemini-2.5-flash"
    system_prompt: "Break down this research topic into 3 specific sub-questions to investigate"
    inputs:
      query: "${user.query}"
    outputs: [plan]

  researcher:
    agent: "llm://gemini/gemini-2.5-flash"
    system_prompt: "Answer this research question with specific facts and references"
    inputs:
      questions: "${planner.plan}"
    outputs: [findings]
    depends_on: [planner]

  summarizer:
    agent: "llm://gemini/gemini-2.5-flash"
    system_prompt: "Synthesize these research findings into a concise summary with key takeaways"
    inputs:
      research: "${researcher.findings}"
    outputs: [report]
    depends_on: [researcher]

defaults:
  deadline_ms: 300000
