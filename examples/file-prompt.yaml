# File Prompt Example
# ===================
# Demonstrates loading system_prompt from external files using file:// prefix.
# Prompts are stored in prompts/ directory relative to this YAML file.
#
# Run:  binex run examples/file-prompt.yaml

name: file-prompt-demo
description: "Demo of file:// system_prompt loading"

nodes:
  planner:
    agent: "local://echo"
    system_prompt: "file://prompts/research-planner.md"
    inputs:
      topic: "hello from file prompt"
    outputs: [result]

  researcher:
    agent: "local://echo"
    system_prompt: "file://prompts/researcher.md"
    inputs:
      plan: "${planner.result}"
    outputs: [final]
    depends_on: [planner]
