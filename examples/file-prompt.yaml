# File Prompt Example
# ===================
# Demonstrates loading system_prompt from external files using file:// prefix.
# Prompts are stored in prompts/ directory relative to this YAML file.
#
# Run:  binex run examples/file-prompt.yaml

name: file-prompt-demo
description: "Demo of file:// system_prompt loading"

nodes:
  producer:
    agent: "local://echo"
    system_prompt: "file://prompts/producer.md"
    inputs:
      data: "hello from file prompt"
    outputs: [result]

  consumer:
    agent: "local://echo"
    system_prompt: "file://prompts/consumer.md"
    inputs:
      data: "${producer.result}"
    outputs: [final]
    depends_on: [producer]
