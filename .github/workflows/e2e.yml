name: E2E Playwright Tests

on:
  push:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          pip install -e ".[dev,rich]"
          pip install playwright httpx
          playwright install --with-deps chromium

      - name: Build frontend
        run: |
          cd ui
          npm ci
          npm run build
          cp -r dist ../src/binex/ui/static

      - name: Start server
        run: |
          python -c "
          import uvicorn
          from binex.ui.server import create_app
          uvicorn.run(create_app(), host='127.0.0.1', port=8420, log_level='warning')
          " &
          sleep 3
          curl -sf http://127.0.0.1:8420/api/v1/health || exit 1

      - name: Run E2E Playwright tests
        run: python -m pytest tests/e2e_playwright/ -x -q --timeout=60
