name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,rich]"
      - run: python -m pytest tests/ -x -q

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          pip install -e ".[dev,rich]"
          pip install playwright httpx
          playwright install --with-deps chromium

      - name: Build frontend
        run: |
          cd ui
          npm ci
          npm run build
          cp -r dist ../src/binex/ui/static

      - name: Start server
        run: |
          python -c "
          import uvicorn
          from binex.ui.server import create_app
          uvicorn.run(create_app(), host='127.0.0.1', port=8420, log_level='warning')
          " &
          sleep 3
          # Verify server is up
          curl -sf http://127.0.0.1:8420/api/v1/health || exit 1

      - name: Run E2E Playwright tests
        run: python -m pytest tests/e2e_playwright/ -x -q --timeout=60
