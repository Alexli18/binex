services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./litellm_config.yaml:/app/litellm_config.yaml:ro
    command: ["--config", "/app/litellm_config.yaml", "--port", "4000"]
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  registry:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - BINEX_AGENT_TYPE=registry
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  planner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - BINEX_AGENT_TYPE=planner
      - BINEX_LLM_MODEL=openai/ollama/llama3.2
      - BINEX_LLM_API_BASE=http://litellm-proxy:4000
      - BINEX_LLM_API_KEY=sk-fake
    depends_on:
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  researcher:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - BINEX_AGENT_TYPE=researcher
      - BINEX_LLM_MODEL=openai/ollama/llama3.2
      - BINEX_LLM_API_BASE=http://litellm-proxy:4000
      - BINEX_LLM_API_KEY=sk-fake
    depends_on:
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  validator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8003:8000"
    environment:
      - BINEX_AGENT_TYPE=validator
      - BINEX_LLM_MODEL=openai/ollama/llama3.2
      - BINEX_LLM_API_BASE=http://litellm-proxy:4000
      - BINEX_LLM_API_KEY=sk-fake
    depends_on:
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  summarizer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8004:8000"
    environment:
      - BINEX_AGENT_TYPE=summarizer
      - BINEX_LLM_MODEL=openai/ollama/llama3.2
      - BINEX_LLM_API_BASE=http://litellm-proxy:4000
      - BINEX_LLM_API_KEY=sk-fake
    depends_on:
      litellm-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  ollama_data:
