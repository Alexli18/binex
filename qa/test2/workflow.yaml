name: start-wizard-workflow
nodes:
  user_input:
    agent: human://input
    system_prompt: What content would you like to create?
    outputs:
    - result
  draft:
    agent: llm://ollama/llama3.2
    outputs:
    - result
    system_prompt: file://prompts/draft-writer.md
    depends_on:
    - user_input
  review:
    agent: llm://ollama/llama3.2
    outputs:
    - result
    system_prompt: file://prompts/content-reviewer.md
    depends_on:
    - draft
  revise:
    agent: llm://ollama/llama3.2
    outputs:
    - result
    system_prompt: file://prompts/content-reviser.md
    depends_on:
    - review
  final:
    agent: llm://ollama/llama3.2
    outputs:
    - result
    depends_on:
    - revise
