name: start-wizard-workflow
nodes:
  user_input:
    agent: human://input
    system_prompt: What decision do you need to make?
    outputs:
    - result
  draft:
    agent: llm://ollama/llama3.2
    outputs:
    - result
    system_prompt: file://prompts/draft-writer.md
    depends_on:
    - user_input
  approve:
    agent: llm://ollama/llama3.2
    outputs:
    - result
    depends_on:
    - draft
  publish:
    agent: llm://ollama/llama3.2
    outputs:
    - result
    depends_on:
    - approve
